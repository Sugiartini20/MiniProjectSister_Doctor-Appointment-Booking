<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Booking - MediBook</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 600px;
            margin: 60px auto;
        }
        
        .success-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
        }
        
        .success-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 40px;
            color: white;
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .success-header h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .success-body {
            padding: 32px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #eef2f6;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .info-value {
            font-weight: 500;
            color: #1a1a2e;
        }
        
        .queue-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 16px;
            margin: 24px 0;
            text-align: center;
        }
        
        .queue-label {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }
        
        .queue-value {
            font-size: 48px;
            font-weight: 800;
            color: white;
        }
        
        .btn-back {
            background: #f0f2f5;
            color: #1a1a2e;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }
        
        .btn-back:hover {
            background: #e4e6eb;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-bar-content">
        <div class="logo">
            <span>🏥</span>
            MediBook
        </div>
        <a href="#" class="help-link">🆘 Bantuan 24/7</a>
    </div>
</div>

<div class="container detail-container">
    <div class="success-card">
        <div class="success-header">
            <div class="success-icon">✅</div>
            <h2>Booking Berhasil!</h2>
            <p>Terima kasih, booking Anda telah dikonfirmasi</p>
        </div>
        <div class="success-body">
            <div class="info-row">
                <span class="info-label">👤 Nama Pasien</span>
                <span class="info-value" id="detailName">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">👨‍⚕️ Dokter</span>
                <span class="info-value" id="detailDoctor">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">📅 Tanggal</span>
                <span class="info-value" id="detailDate">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">⏰ Jam</span>
                <span class="info-value" id="detailTime">-</span>
            </div>
            
            <div class="queue-number">
                <div class="queue-label">Nomor Antrean Anda</div>
                <div class="queue-value" id="detailQueue">-</div>
            </div>
            
            <button class="btn-back" onclick="goBack()">
                ← Kembali ke Halaman Booking
            </button>
        </div>
    </div>
</div>

<div class="footer">
    <p>MediBook - Distributed System Project © 2026</p>
</div>

<script>
    function loadDetail() {
        const data = localStorage.getItem("bookingDetail");
        if (data) {
            const booking = JSON.parse(data);
            document.getElementById("detailName").innerText = booking.patient_name || "-";
            document.getElementById("detailDoctor").innerText = booking.doctor_name || "-";
            document.getElementById("detailDate").innerText = booking.tanggal || "-";
            document.getElementById("detailTime").innerText = booking.jam || "-";
            document.getElementById("detailQueue").innerText = booking.queue_number || "-";
        } else {
            document.querySelector(".success-body").innerHTML = "<p style='padding:40px;'>Belum ada data booking. Silakan booking terlebih dahulu.</p>";
        }
    }
    
    function goBack() {
        window.location.href = "index.html";
    }
    
    loadDetail();
</script>

</body>
</html>
